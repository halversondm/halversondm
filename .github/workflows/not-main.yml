name: CD
on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build